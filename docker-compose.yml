x-app-env: &app-env
  DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-factory_hypotheses}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
  OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
  OPENROUTER_MODEL: ${OPENROUTER_MODEL:-~openai/gpt-latest}
  OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE:-Factory of Hypotheses MVP}
  OPENROUTER_APP_URL: ${OPENROUTER_APP_URL:-http://localhost:8000}
  # RAG через Yandex Cloud Foundation Models (облако, не локальный контур).
  YANDEX_API_KEY: ${YANDEX_API_KEY:-}
  YANDEX_FOLDER_ID: ${YANDEX_FOLDER_ID:-}
  YANDEX_CHAT_MODEL: ${YANDEX_CHAT_MODEL:-yandexgpt-lite}
  YANDEX_EMBED_DOC_MODEL: ${YANDEX_EMBED_DOC_MODEL:-text-search-doc}
  YANDEX_EMBED_QUERY_MODEL: ${YANDEX_EMBED_QUERY_MODEL:-text-search-query}
  YANDEX_TIMEOUT: ${YANDEX_TIMEOUT:-60}
  EMBED_DIM: ${EMBED_DIM:-256}
  CORPUS_PATH: /corpus
  RAG_TOP_K: ${RAG_TOP_K:-6}

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-factory_hypotheses}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    # Порт открыт только на loopback: снаружи сервера БД недоступна,
    # но локальная разработка по localhost:5433 работает как раньше.
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-factory_hypotheses}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    environment: *app-env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "./Задача 1:/corpus:ro"
      - "./backend:/app/backend"
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: .
    environment:
      API_BASE: http://api:8000
    command:
      - "streamlit"
      - "run"
      - "frontend/app.py"
      - "--server.address=0.0.0.0"
      - "--server.port=8501"
      - "--theme.base=dark"
      - "--theme.primaryColor=#00FFBF"
      - "--theme.backgroundColor=#0b0f17"
      - "--theme.secondaryBackgroundColor=#151b28"
      - "--theme.textColor=#eef2f5"
    volumes:
      - "./frontend:/app/frontend"
    # Только loopback: прод-оверлей публикует UI на 0.0.0.0:${APP_PORT}.
    # Для локальной разработки localhost:8501 работает как раньше.
    ports:
      - "127.0.0.1:8501:8501"
    depends_on:
      api:
        condition: service_healthy

  seed:
    build: .
    environment: *app-env
    volumes:
      - "./backend:/app/backend"
      - "./db:/app/db"
    command: ["python", "-m", "db.seed"]
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - tools

  corpus-index:
    build: .
    environment: *app-env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "./Задача 1:/corpus:ro"
      - "./backend:/app/backend"
      - "./db:/app/db"
    command: ["python", "-m", "backend.rag.cli", "/corpus"]
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - tools

volumes:
  postgres_data:
