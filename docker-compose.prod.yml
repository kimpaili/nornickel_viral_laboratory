# Продакшн-оверлей для сервера.
# UI слушает 0.0.0.0:${APP_PORT:-80}, API — 0.0.0.0:8000 (из base-файла).
#
# Запуск:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
# Или просто:  ./start.sh
services:
  db:
    restart: unless-stopped

  api:
    restart: unless-stopped
    # Прод-режим: без --reload (watcher не нужен), несколько воркеров.
    # Порт API берётся из base (8000:8000) — здесь его не дублируем, иначе
    # docker получит два маппинга на один хост-порт и упадёт с конфликтом.
    command:
      - "uvicorn"
      - "backend.main:app"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
      - "--workers"
      - "${API_WORKERS:-2}"

  frontend:
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:8501"
    command:
      - "streamlit"
      - "run"
      - "frontend/app.py"
      - "--server.address=0.0.0.0"
      - "--server.port=8501"
      - "--server.headless=true"
      - "--server.enableCORS=false"
      - "--server.enableXsrfProtection=false"
      - "--browser.gatherUsageStats=false"
      - "--theme.base=dark"
      - "--theme.primaryColor=#00FFBF"
      - "--theme.backgroundColor=#0b0f17"
      - "--theme.secondaryBackgroundColor=#151b28"
      - "--theme.textColor=#eef2f5"
